  schemas:
    Error:
      description: ""
      required:
        - type
        - title
        - status
        - errorCode
      type: object
      properties:
        type:
          type: string
          format: uri
          description: An URI reference that identifies the problem type. When
            dereferenced, it SHOULD provide human-readable documentation for the
            problem type (e.g. using HTML).
        title:
          type: string
          description: A short, summary of the problem type. Written in English and
            readable for engineers (usually not suited for non technical
            stakeholders and not localized)
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server for this
            occurrence of the problem.
          minimum: 400
          maximum: 600
          exclusiveMaximum: true
        errorCode:
          description: The error code is a string that uniquely identifies an error
            condition and should be understood by programs that detect and
            handle errors by type
          enum:
            - AccessDenied
            - ExpiredToken
            - InvalidToken
            - InvalidURI
            - MethodNotAllowed
            - NotFound
            - NotImplemented
            - ServiceUnavailable
            - UnexpectedContent
            - UnknownError
          type: string
        details:
          description: The error message contains a generic description of the error
            condition in English. It is intended for a human audience
          type: string
        instance:
          description: ID of the object that is involved in the error (or empty)
          type: string
          format: uri
        data:
          type: object
          description: Error payload
          additionalProperties:
            type: object
